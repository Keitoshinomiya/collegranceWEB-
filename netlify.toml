# Netlify Configuration File
# COLLEGRANCE Website Deployment Settings

[build]
  # 静的HTMLサイト + Netlify Functions
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

[functions]
  included_files = ["catalog_full.json", "products.json"]

# Netlify Functions: /api/* → /.netlify/functions/*
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ────────────────────────────────────────────────────
# Scheduled Functions
# ────────────────────────────────────────────────────
# ★ テスト用スケジュール: 毎日 JST 12:00 (= UTC 03:00)
#   → 今日のテスト送信に使用。BROADCAST_ENABLED=true にして実行。
#
# ★ 本番スケジュール（3/29 JST 00:00）に切り替える場合:
#   schedule = "0 15 28 3 *"
#   （2025-03-29 JST 00:00 = UTC 2025-03-28 15:00）
#
# ★★ 安全スイッチ ★★
# Netlify 環境変数 BROADCAST_ENABLED=true にしないと
# スケジュールが起動しても実際の LINE 送信はスキップされます。
# LINE_CHANNEL_ACCESS_TOKEN も必ず設定してください。
[functions."scheduled-broadcast"]
  schedule = "0 3 * * *"

# ブランチごとのデプロイ設定
[context.production]
  publish = "."
  
[context.deploy-preview]
  publish = "."

# HTTPヘッダーの設定（セキュリティとパフォーマンス）
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
# CSS・画像などの静的ファイル（長期キャッシュ）
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JSファイル（articles.js等は更新されるので短期キャッシュ）
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# HTMLファイルのキャッシュ設定
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 画像ファイルのキャッシュ設定
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /admin/* には noindex を必ず付与（検索エンジンに掲載させない）
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

# /admin/* のBasic認証は Netlify ダッシュボードの「Site settings → Visitor access → Password protection」
# または Netlify Pro 以上の「Role-based access control」で設定してください。
# Free プランの場合は知識ベースのみで運用：URL知らない人にはアクセス不可。

# リダイレクト設定
[[redirects]]
  from = "/tokushoho"
  to = "/tokushoho.html"
  status = 200
  force = false

# shop.html → トップページにリダイレクト（ページ構成変更に伴う301リダイレクト）
[[redirects]]
  from = "/shop.html"
  to = "/"
  status = 301
  force = true

# 404エラーページの設定（存在する場合）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# フォーム送信の設定（将来的なお問い合わせフォーム用）
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
